<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pose Detection (PoseNet)</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <!-- PoseNet Model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7f7, #e3edfa);
      text-align: center;
      color: #333;
    }

    h1 {
      margin-top: 20px;
    }

    #container {
      position: relative;
      display: inline-block;
      margin-top: 20px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    video {
      border-radius: 15px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    button {
      margin: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      background: #ff7eb3;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4f91;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1> Pose Detection (PoseNet)</h1>

  <div id="container">
    <video id="video" width="600" height="500" autoplay muted></video>
    <canvas id="canvas" width="600" height="500"></canvas>
  </div>

  <div>
    <button onclick="startDetection()">▶ Start</button>
    <button onclick="stopDetection()">⏹ Stop</button>
  </div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let net;
let stream;
let isRunning = false;

// Setup camera
async function setupCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: false
  });
  video.srcObject = stream;

  return new Promise((resolve) => {
    video.onloadedmetadata = () => {
      resolve(video);
    };
  });
}

// Load PoseNet
async function loadModel() {
  net = await posenet.load({
    architecture: "MobileNetV1",
    outputStride: 16,
    inputResolution: { width: 600, height: 500 },
    multiplier: 0.75
  });
}

// Draw keypoints
function drawKeypoints(keypoints) {
  keypoints.forEach(point => {
    if (point.score > 0.5) {
      ctx.beginPath();
      ctx.arc(point.position.x, point.position.y, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#ff0000";
      ctx.fill();
    }
  });
}

// Draw skeleton
function drawSkeleton(keypoints) {
  const adjacentKeyPoints = posenet.getAdjacentKeyPoints(keypoints, 0.5);

  adjacentKeyPoints.forEach(pair => {
    ctx.beginPath();
    ctx.moveTo(pair[0].position.x, pair[0].position.y);
    ctx.lineTo(pair[1].position.x, pair[1].position.y);
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#00ff00";
    ctx.stroke();
  });
}

// Detection loop
async function detectPose() {
  if (!isRunning) return;

  const pose = await net.estimateSinglePose(video, {
    flipHorizontal: true
  });

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawKeypoints(pose.keypoints);
  drawSkeleton(pose.keypoints);

  requestAnimationFrame(detectPose);
}

// Start button
async function startDetection() {
  if (isRunning) return;

  isRunning = true;

  await setupCamera();
  await loadModel();

  video.play();
  detectPose();
}

// Stop button
function stopDetection() {
  isRunning = false;

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

</script>

</body>
</html>
