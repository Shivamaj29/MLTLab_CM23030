<!DOCTYPE html>
<html>
<head>
<title>Webcam Classification Overlay</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
text-align:center;
padding:40px;
}

.container{
background:white;
width:520px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.video-wrapper{
position:relative;
display:inline-block;
}

video{
border-radius:10px;
border:3px solid #333;
}

.label{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:6px 10px;
border-radius:6px;
font-size:14px;
}

button{
padding:10px 18px;
margin:10px;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

.start{
background:#28a745;
color:white;
}

.stop{
background:#dc3545;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Webcam Object Classification</h2>
<p>MobileNet + TensorFlow.js</p>

<div class="video-wrapper">

<video id="webcam" width="420" height="320" autoplay></video>

<div id="overlayLabel" class="label">
Waiting for prediction...
</div>

</div>

<br>

<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>

</div>

<script>

let model;
let video = document.getElementById("webcam");
let label = document.getElementById("overlayLabel");

let stream;
let running = false;

// Start webcam
async function startWebcam(){

stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

}

// Load MobileNet
async function loadModel(){

model = await mobilenet.load();
console.log("MobileNet Loaded");

}

// Prediction loop
async function classify(){

if(!running) return;

const predictions = await model.classify(video);

const top = predictions[0];

label.innerText =
top.className +
" (" + (top.probability*100).toFixed(2) + "%)";

requestAnimationFrame(classify);

}

// Start system
async function start(){

running = true;

await startWebcam();

if(!model){
await loadModel();
}

classify();

}

// Stop system
function stop(){

running = false;

if(stream){
stream.getTracks().forEach(track => track.stop());
}

label.innerText = "Detection Stopped";

}

</script>

</body>
</html>
